<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #faf9f5;
    --panel: #ffffff;
    --panel-2: #f4f2ea;
    --line: #d9d5c9;
    --ink: #1c1c19;
    --muted: #6d6a60;
    --kr: #7a2230;
    --us: #1f3a5c;
    --good: #2f6b4f;
    --bad: #8a3324;
    --stamp: #7a2230;
    --radius: 4px;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --serif: 'Pretendard', -apple-system, BlinkMacSystemFont, ui-sans-serif, sans-serif;
    --body: 'Pretendard', -apple-system, BlinkMacSystemFont, ui-sans-serif, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--body);
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  a{color:inherit}

  /* ---------- masthead ---------- */
  header.mast{ border-bottom:2px solid var(--ink); background:var(--bg); position:sticky; top:0; z-index:40; }
  .mast-inner{ max-width:1080px; margin:0 auto; padding:24px 24px 0; }
  .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; color:var(--muted);
    display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line); padding-bottom:10px;
    flex-wrap:wrap; gap:6px;
  }
  .update-tag{
    letter-spacing:normal; display:flex; align-items:center; gap:6px; color:var(--muted); font-size:11px;
  }
  .update-tag b{ color:var(--ink); font-weight:600; }
  .update-dot{ width:6px; height:6px; border-radius:50%; background:var(--good); display:inline-block; }
  h1{
    font-family:var(--serif); font-weight:600; font-size:32px; letter-spacing:-.01em; margin:14px 0 4px;
  }
  .dek{ font-size:14px; color:var(--muted); margin:0 0 18px; max-width:640px; line-height:1.5; }

  /* market section blocks */
  .market-block{ max-width:1080px; margin:0 auto; padding:0 24px; }
  .market-block + .market-block{ border-top:1px solid var(--line); }
  .market-head{
    display:flex; align-items:baseline; gap:10px; margin:40px 0 6px;
  }
  .market-block:first-child .market-head{ margin-top:28px; }
  .market-head h2{ font-family:var(--serif); font-size:24px; font-weight:600; margin:0; }
  .market-head .market-tag{ font-family:var(--mono); font-size:11px; color:var(--muted); }
  .market-head.kr h2{ color:var(--kr); }
  .market-head.us h2{ color:var(--us); }

  /* index filter row */
  .filters{
    display:flex; align-items:center; gap:18px; flex-wrap:wrap; padding:8px 0 14px;
    font-family:var(--serif); font-size:16px; color:var(--muted);
  }
  .filters .lbl{ letter-spacing:.06em; }
  .filters button{
    font-family:var(--serif); font-size:16px; font-weight:600; background:none; border:none; color:var(--muted);
    cursor:pointer; padding:3px 0; border-bottom:2px solid transparent;
  }
  .filters button.active{ color:var(--ink); border-bottom:2px solid var(--ink); }
  .filters .sep{ color:var(--line); font-size:16px; }

  .fx-line{
    display:none; font-family:var(--mono); font-size:11.5px; color:var(--us); padding:0 0 10px;
  }
  .fx-line.show{ display:block; }
  .fx-line span{ color:var(--muted); }

  /* ---------- main table ---------- */
  main{ padding-bottom:20px; }
  table.sheet{ width:100%; border-collapse:collapse; }
  .sheet thead th{
    text-align:left; font-family:var(--mono); font-size:12.5px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.05em; padding:12px 8px; border-bottom:1px solid var(--ink); font-weight:600;
  }
  .sheet thead th.num{ text-align:right; }
  .sheet tbody tr.row{ cursor:pointer; }
  .sheet tbody tr.row td{ padding:14px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
  .sheet tbody tr.row:hover td{ background:var(--panel-2); }
  .num{ font-family:var(--mono); font-variant-numeric:tabular-nums; text-align:right; font-size:13px; }
  .idxno{ font-family:var(--mono); color:var(--muted); font-size:12px; width:28px; }
  .fname{ font-family:var(--serif); font-weight:600; font-size:15.5px; }
  .fname.ticker-lead{ font-family:var(--mono); font-weight:700; font-size:17px; letter-spacing:.03em; }
  .fname .lev{ font-family:var(--mono); font-size:9.5px; color:var(--bad); border:1px solid var(--bad); border-radius:3px; padding:1px 4px; margin-left:5px; font-weight:600;}
  .fname .stamp{ margin-left:5px; vertical-align:1px; }
  .div-line{
    font-family:var(--mono); font-size:12.5px; color:var(--ink); margin-top:5px;
    padding-top:5px; border-top:1px dashed var(--line); display:flex; align-items:center; gap:6px; justify-content:flex-end;
  }
  .div-line .div-yield{ font-weight:700; color:var(--good); font-size:13.5px; }
  .div-line .div-freq{ color:var(--muted); }
  .stamp.div{ border-color:var(--good); color:var(--good); transform:rotate(-3deg); }
  .ticker{ font-family:var(--mono); font-size:11.5px; color:var(--muted); display:block; margin-top:2px; }
  .issuer{ font-size:12.5px; color:var(--muted); }
  .fee-cell{ position:relative; }
  .fee-num{ font-weight:600; }
  .stamp{
    display:inline-block; font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.02em;
    padding:2px 6px; border:1.3px solid var(--stamp); color:var(--stamp); border-radius:3px;
    transform:rotate(-4deg); white-space:nowrap;
  }
  .stamp.vol{ border-color:var(--us); color:var(--us); transform:rotate(3deg); }
  .chev{ text-align:right; color:var(--muted); font-size:11px; width:16px; }

  /* detail row */
  tr.detail-row td{ padding:0 8px 22px; border-bottom:1px solid var(--line); background:var(--panel-2); }
  tr.detail-row.closed{ display:none; }
  .detail-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:14px 0 16px; padding-top:14px; border-top:1px dashed var(--line); }
  .stat-label{ font-family:var(--mono); font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
  .stat-value{ font-family:var(--mono); font-size:13.5px; margin-top:3px; }
  .pc-grid{ display:grid; grid-template-columns:1fr 1fr; gap:22px; }
  .pc-box{ border-left:2px solid var(--line); padding-left:12px; }
  .pc-box.pro{ border-color:var(--good); }
  .pc-box.con{ border-color:var(--bad); }
  .pc-box h4{ font-family:var(--serif); font-size:13px; margin:0 0 7px; font-weight:600; }
  .pc-box.pro h4{ color:var(--good); }
  .pc-box.con h4{ color:var(--bad); }
  .pc-box ul{ margin:0; padding-left:16px; font-size:13px; line-height:1.6; color:#33322c; }
  .site-link{
    display:inline-block; margin-top:16px; font-family:var(--mono); font-size:12px; color:var(--us);
    border-bottom:1px solid var(--us); padding-bottom:1px; text-decoration:none;
  }
  .site-link:hover{ opacity:.7; }

  .empty{ padding:60px 10px; text-align:center; color:var(--muted); font-family:var(--mono); font-size:13px; }

  footer{
    max-width:1080px; margin:10px auto 0; padding:20px 24px 60px; color:var(--muted); font-size:11.5px;
    font-family:var(--mono); border-top:1px solid var(--line); line-height:1.7;
  }

  @media (max-width:720px){
    h1{ font-size:26px; }
    .sheet thead{ display:none; }
    .sheet tbody tr.row{ display:block; padding:14px 0; border-bottom:1px solid var(--line); }
    .sheet tbody tr.row td{ display:block; border:none; padding:2px 0; }
    .num{ text-align:left; }
    .div-line{ justify-content:flex-start; }
    .detail-grid{ grid-template-columns:1fr 1fr; }
    .pc-grid{ grid-template-columns:1fr; }
  }
</style>
</head>

// 마지막 데이터 갱신일 — data.json 로드 실패 시 쓰이는 fallback 값
const LAST_UPDATED_FALLBACK = '2026-07-11';
document.getElementById('dateStamp').textContent = LAST_UPDATED_FALLBACK.replaceAll('-', '.');

// data.json(funetf.co.kr에서 매일 긁어온 가격·거래량)을 FUNDS에 병합
async function loadLiveData(){
  try{
    const res = await fetch('./data.json', { cache: 'no-store' });
    if(!res.ok) throw new Error('data.json fetch failed: ' + res.status);
    const data = await res.json();
    if(data.updated){
      document.getElementById('dateStamp').textContent = data.updated.replaceAll('-', '.');
    }
    if(data.usdKrw){
      document.getElementById('fxRate').textContent = `1 USD ≈ ${Math.round(data.usdKrw).toLocaleString()}원`;
    }
    const fundsData = data.funds || {};
    FUNDS.forEach(f=>{
      const key = fundsData[f.isin] ? f.isin : (fundsData[f.ticker] ? f.ticker : null);
      if(key){
        const live = fundsData[key];
        if(live.price) f.price = live.price;
        if(live.aum) f.aum = live.aum;
      }
    });
  }catch(e){
    console.warn('실시간 데이터(data.json) 로드 실패, 내장된 스냅샷 값을 사용합니다:', e);
  }
}

const IDX_LABEL = { sp500:'S&P 500', ndx100:'나스닥 100', kospi:'코스피', leverage:'나스닥100 레버리지' };
const MARKET_LABEL = { kr:'KR', us:'US' };

// 순자산 문자열을 비교 가능한 숫자로 변환. 원화("2조 7,498억원")는 억원 단위, 달러("$3.9B")는 달러 단위. 데이터 없으면 null.
function parseAumToEok(str){
  if(!str || str.trim()==='-') return null;
  str = str.trim();
  if(str.startsWith('$')){
    const m = str.match(/\$([\d.]+)\s*([BMK])?/i);
    if(!m) return null;
    let num = parseFloat(m[1]);
    const suf = (m[2]||'').toUpperCase();
    if(suf==='B') num *= 1e9;
    else if(suf==='M') num *= 1e6;
    else if(suf==='K') num *= 1e3;
    return num;
  }
  let total = 0, matched = false;
  const jo = str.match(/([\d,]+)\s*조/);
  const eok = str.match(/([\d,]+)\s*억/);
  if(jo){ total += parseFloat(jo[1].replace(/,/g,'')) * 10000; matched = true; }
  if(eok){ total += parseFloat(eok[1].replace(/,/g,'')); matched = true; }
  return matched ? total : null;
}

// 같은 시장(KR/US) × 같은 추종지수 그룹 안에서만 비교해 배지를 매김
function computeBadges(){
  const groups = {};
  FUNDS.forEach(f=>{
    const key = f.market+'|'+f.idx;
    (groups[key] = groups[key] || []).push(f);
  });
  Object.values(groups).forEach(list=>{
    if(list.length > 1){
      const minFee = Math.min(...list.map(f=>f.fee));
      list.forEach(f=> f._isBestFee = (f.fee === minFee));
    }
    const withAum = list.map(f=>({f, v:parseAumToEok(f.aum)})).filter(x=>x.v!==null);
    if(withAum.length > 1){
      const maxAum = Math.max(...withAum.map(x=>x.v));
      withAum.forEach(x=>{ if(x.v === maxAum) x.f._isTopAum = true; });
    }
    if(list.length > 1){
      const maxDiv = Math.max(...list.map(f=>parseFloat(f.divYield)));
      list.forEach(f=>{ if(parseFloat(f.divYield) === maxDiv) f._isTopDiv = true; });
    }
  });
}

function fmtFee(f){ return f.toFixed(3).replace(/0$/,'').replace(/\.$/,'') + '%'; }

// 시장별로 표시 가능한 카테고리(해당 시장에 실제로 등록된 종목이 있는 idx만)
const IDX_ORDER = ['sp500','ndx100','leverage','kospi'];
function idxListFor(market){
  return IDX_ORDER.filter(idx => FUNDS.some(f => f.market===market && f.idx===idx));
}

let state = { kr:'sp500', us:'sp500' };

function buildChips(market){
  const wrap = document.querySelector(`.filters[data-chips-for="${market}"]`);
  const idxList = idxListFor(market);
  wrap.innerHTML = idxList.map((idx,i)=>
    `${i>0? '<span class="sep">·</span>' : ''}<button data-idx="${idx}" class="${idx===state[market]?'active':''}">${IDX_LABEL[idx]}</button>`
  ).join('');
  wrap.addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    state[market] = btn.dataset.idx;
    wrap.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===btn));
    render(market);
  });
}

function render(market){
  const tbody = document.getElementById(`rows-${market}`);
  const list = FUNDS.filter(f => f.market===market && f.idx===state[market])
    .sort((a,b) => (parseAumToEok(b.aum) ?? -Infinity) - (parseAumToEok(a.aum) ?? -Infinity));
  tbody.innerHTML = '';
  if(list.length===0){
    tbody.innerHTML = `<tr><td colspan="6" class="empty">아직 이 카테고리에 등록된 종목이 없어요.</td></tr>`;
    return;
  }
  list.forEach((f,i)=>{
    const row = document.createElement('tr');
    row.className = 'row';
    row.innerHTML = `
      <td class="idxno">${String(i+1).padStart(2,'0')}</td>
      <td>
        ${f.market==='us' ? `
        <div class="fname ticker-lead">${f.ticker}${f.leverage? `<span class="lev">${f.leverage}</span>`:''}${f._isTopAum? '<span class="stamp vol">순자산 1위</span>':''}</div>
        <span class="ticker">${f.name} · ${f.issuer}</span>
        ` : `
        <div class="fname">${f.name}${f.leverage? `<span class="lev">${f.leverage}</span>`:''}${f._isTopAum? '<span class="stamp vol">순자산 1위</span>':''}</div>
        <span class="ticker">${f.ticker} · ${f.issuer}</span>
        `}
      </td>
      <td class="num fee-cell"><span class="fee-num">${fmtFee(f.fee)}</span> ${f._isBestFee? '<span class="stamp">최저보수</span>':''}</td>
      <td class="num" style="color:var(--muted)">${f.listed}</td>
      <td class="num">
        <div>${f.price}</div>
        <div class="div-line">
          <span class="div-freq">배당 ${f.divFreq}</span>
          <span class="div-yield">${f.divYield}</span>
          ${f._isTopDiv? '<span class="stamp div">배당 1위</span>':''}
        </div>
      </td>
      <td class="chev">▾</td>
    `;
    const detailRow = document.createElement('tr');
    detailRow.className = 'detail-row closed';
    detailRow.innerHTML = `
      <td colspan="6">
        <div class="detail-grid">
          <div><div class="stat-label">지수</div><div class="stat-value">${IDX_LABEL[f.idx]}</div></div>
          <div><div class="stat-label">순자산</div><div class="stat-value">${f.aum}</div></div>
          <div><div class="stat-label">상장 시장</div><div class="stat-value">${MARKET_LABEL[f.market]==='KR'?'한국거래소':'미국(NYSE/NASDAQ)'}</div></div>
        </div>
        <div class="pc-grid">
          <div class="pc-box pro"><h4>장점</h4><ul>${f.pros.map(p=>`<li>${p}</li>`).join('')}</ul></div>
          <div class="pc-box con"><h4>단점</h4><ul>${f.cons.map(c=>`<li>${c}</li>`).join('')}</ul></div>
        </div>
        ${f.url? `<a class="site-link" href="${f.url}" target="_blank" rel="noopener noreferrer">운용사 공식 상품 페이지 열기 ↗</a>` : ''}
      </td>
    `;
    row.addEventListener('click', ()=>{
      const closed = detailRow.classList.contains('closed');
      detailRow.classList.toggle('closed', !closed);
      row.querySelector('.chev').textContent = closed ? '▴' : '▾';
    });
    tbody.appendChild(row);
    tbody.appendChild(detailRow);
  });
}

async function init(){
  await loadLiveData();
  computeBadges();
  ['kr','us'].forEach(market=>{
    buildChips(market);
    render(market);
  });
}
init();
</script>
